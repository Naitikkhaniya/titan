apiVersion: apps/v1
kind: Deployment

metadata:
  name: titan-backend
  labels:
    app: titan-backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: titan-backend

  template:
    metadata:
      labels:
        app: titan-backend

    spec:
      containers:
      - name: backend
        image: titan-backend:1.0
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 3000

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10